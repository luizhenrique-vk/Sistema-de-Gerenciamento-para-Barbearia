spring.application.name=crudapi

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/barbershop_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

server.error.include-message=always

security.jwt.secret=${JWT_SECRET:barbershop-secret-key-barbershop-secret-key-2026}
security.jwt.expiration-in-minutes=${JWT_EXPIRATION_MINUTES:180}
